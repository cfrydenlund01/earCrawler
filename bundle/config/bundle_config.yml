version: 1
fuseki:
  host: 127.0.0.1
  port: 3030
  timeout_seconds: 120
  jvm_opts: "-Xms512m -Xmx1024m"
  log_dir: fuseki/logs
  health_query: "PREFIX text: <http://jena.apache.org/text#> PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#> SELECT (COUNT(*) AS ?count) WHERE { (?entity ?score ?snippet) text:query (rdfs:label \"__earcrawler_text_probe__\") . }"
dataset:
  assembler: fuseki/tdb2-readonly.ttl
  location: fuseki/databases/tdb2
  source:
    nq: kg/dataset.nq
    ttl: kg/dataset.ttl
bootstrap:
  first_run_marker: fuseki/databases/first_run.ok
