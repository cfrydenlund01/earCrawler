name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

env:
  HF_HUB_DISABLE_PROGRESS_BARS: "1"
  PYTHONUTF8: "1"

permissions:
  contents: read

jobs:
  cpu:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      TRADEGOV_API_KEY: ${{ secrets.TRADEGOV_API_KEY }}
      FEDREG_API_KEY: ${{ secrets.FEDREG_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Release evidence preflight drift guard
        shell: pwsh
        run: scripts/release-evidence-preflight.ps1 -AllowEmptyDist
      - name: Guard versions
        shell: pwsh
        run: python scripts/check_versions.py
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.11-${{ hashFiles('**/requirements*.txt') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade --retries 5 -r requirements.txt
          pip install --upgrade --retries 5 -e .
          pip install --upgrade "coverage[toml]"
      - name: Packaging smoke (wheel in isolated venv)
        shell: pwsh
        run: scripts/package-wheel-smoke.ps1
      - name: Lint
        run: black --check . && flake8 .
      - name: CI security baseline (dependency audit + SAST + secret scan)
        shell: pwsh
        run: scripts/security-baseline.ps1 -Python py -RequirementsLock requirements-win-lock.txt -PipAuditIgnoreFile security/pip_audit_ignore.txt -OutputDir dist/security
      - name: Tests with coverage gate
        run: |
          python -m coverage erase
          pytest -q --disable-warnings --maxfail=1 --cov --cov-report=xml:dist/coverage/coverage.xml --cov-report=term-missing:skip-covered
      - name: API latency and failure budget gate
        run: python scripts/api_perf_smoke.py --budgets perf/config/api_route_budgets.yml --report dist/perf/api_perf_smoke.json

      - name: Corpus determinism gate (offline fixtures)
        shell: pwsh
        env:
          EARCTL_ALLOW_UNSAFE_ENV_OVERRIDES: "1"
          EARCTL_USER: test_operator
          SOURCE_DATE_EPOCH: "946684800"
        run: pwsh scripts/ci-corpus-determinism.ps1

      - name: Supported corpus build gate (offline fixtures)
        shell: pwsh
        env:
          EARCTL_ALLOW_UNSAFE_ENV_OVERRIDES: "1"
          EARCTL_USER: test_operator
        run: py -m earCrawler.cli corpus build -s ear -s nsf --out dist\ci_supported_path\data --fixtures tests/fixtures
      - name: Supported corpus validate gate
        shell: pwsh
        env:
          EARCTL_ALLOW_UNSAFE_ENV_OVERRIDES: "1"
          EARCTL_USER: test_operator
        run: py -m earCrawler.cli corpus validate --dir dist\ci_supported_path\data
      - name: Supported KG emit gate
        shell: pwsh
        env:
          EARCTL_ALLOW_UNSAFE_ENV_OVERRIDES: "1"
          EARCTL_USER: test_operator
        run: py -m earCrawler.cli kg-emit -s ear -s nsf -i dist\ci_supported_path\data -o dist\ci_supported_path\kg
      - name: Supported KG semantic gate
        run: py -m cli.kg_validate --glob "dist\ci_supported_path\kg\*.ttl" --fail-on supported --blocking-check orphan_paragraphs --blocking-check entity_mentions_without_type
      - name: Start supported API smoke service
        shell: pwsh
        run: scripts/api-start.ps1 -Host 127.0.0.1 -Port 9001
      - name: Supported API smoke gate
        shell: pwsh
        run: scripts/api-smoke.ps1 -Host 127.0.0.1 -Port 9001
      - name: Stop supported API smoke service
        if: always()
        shell: pwsh
        run: scripts/api-stop.ps1
      - name: Optional runtime smoke gate (release-shaped, no local adapter artifact)
        shell: pwsh
        run: scripts/optional-runtime-smoke.ps1 -Host 127.0.0.1 -Port 9001 -SkipLocalAdapter -ReportPath dist/optional_runtime_smoke.json
      - name: No-network RAG smoke gate
        run: py -m pytest -q tests/golden/test_phase2_golden_gate.py
      - name: Phase B baseline drift gate
        shell: pwsh
        run: |
          kg/scripts/phase-b-freeze.ps1
          git diff --exit-code -- kg/baseline
      - name: Phase B determinism check
        shell: pwsh
        run: scripts/rebuild-compare.ps1 -Version ci
      - name: Validate evaluation datasets
        run: python eval/validate_datasets.py
      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval
          path: dist/eval
          if-no-files-found: ignore
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: dist/coverage/coverage.xml
          if-no-files-found: error
      - name: Upload perf smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-perf-smoke
          path: dist/perf/api_perf_smoke.json
          if-no-files-found: error
      - name: Upload security baseline reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-baseline
          path: dist/security/*.json
          if-no-files-found: error
      - name: Upload optional runtime smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optional-runtime-smoke
          path: dist/optional_runtime_smoke.json
          if-no-files-found: ignore

  gpu:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    env:
      TRADEGOV_API_KEY: ${{ secrets.TRADEGOV_API_KEY }}
      FEDREG_API_KEY: ${{ secrets.FEDREG_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.11-${{ hashFiles('**/requirements*.txt') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-gpu.txt
      - name: Cache Hugging Face models
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements-gpu.txt') }}
      - name: Tests
        run: pytest -m gpu

  benchmark:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-gpu-t4
    needs: cpu
    continue-on-error: true
    timeout-minutes: 60
    env:
      TRADEGOV_API_KEY: ${{ secrets.TRADEGOV_API_KEY }}
      FEDREG_API_KEY: ${{ secrets.FEDREG_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-gpu.txt
      - name: Run benchmark
        run: bash eval/collect_benchmark.sh
      - name: Upload benchmark
        uses: actions/upload-artifact@v4
        with:
          name: benchmark
          path: benchmark.md

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: cpu
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      TRADEGOV_API_KEY: ${{ secrets.TRADEGOV_API_KEY }}
      FEDREG_API_KEY: ${{ secrets.FEDREG_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Run monitor against staging
        shell: pwsh
        run: ./monitor.ps1 -Services @('https://staging/api/health','https://staging/kg/health')
