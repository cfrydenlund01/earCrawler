name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

env:
  HF_HUB_DISABLE_PROGRESS_BARS: "1"
  PYTHONUTF8: "1"

permissions:
  contents: read

jobs:
  cpu:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      TRADEGOV_API_KEY: ${{ secrets.TRADEGOV_API_KEY }}
      FEDREG_API_KEY: ${{ secrets.FEDREG_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Guard versions
        shell: pwsh
        run: python scripts/check_versions.py
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.11-${{ hashFiles('**/requirements*.txt') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade --retries 5 -r requirements.txt
          pip install --upgrade --retries 5 -e .
          pip install --upgrade "coverage[toml]"
      - name: Packaging smoke (wheel in isolated venv)
        shell: pwsh
        run: scripts/package-wheel-smoke.ps1
      - name: Lint
        run: black --check . && flake8 .
      - name: Tests
        run: pytest -q --disable-warnings --maxfail=1

      - name: Corpus determinism gate (offline fixtures)
        shell: pwsh
        env:
          EARCTL_USER: test_operator
          SOURCE_DATE_EPOCH: "946684800"
        run: pwsh scripts/ci-corpus-determinism.ps1

      - name: Build TTL bundle
        run: python -m earCrawler.pipelines.build_ttl
      - name: SHACL gate on bundle
        run: python -m earCrawler.validation.validate_shapes
      - name: Phase B baseline drift gate
        shell: pwsh
        run: |
          kg/scripts/phase-b-freeze.ps1
          git diff --exit-code -- kg/baseline
      - name: Phase B determinism check
        shell: pwsh
        run: scripts/rebuild-compare.ps1 -Version ci
      - name: Conditional Fuseki load (skipped in CI)
        run: echo "Skipping network load in CI"

      - name: Smoke test emit and validate
        shell: pwsh
        run: |
          python -m cli.kg_emit --sources ear --sources nsf --in tests\kg\fixtures --out tests\kg\artifacts
          python -m cli.kg_validate --glob "tests\kg\artifacts\*.ttl"
          $code = @'
          import glob
          from rdflib import Graph
          for path in glob.glob(r"tests\kg\artifacts\*.ttl"):
              Graph().parse(path, format="turtle")
          '@
          python -c $code
      - name: Validate evaluation datasets
        run: python eval/validate_datasets.py
      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval
          path: dist/eval
          if-no-files-found: ignore

  gpu:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    env:
      TRADEGOV_API_KEY: ${{ secrets.TRADEGOV_API_KEY }}
      FEDREG_API_KEY: ${{ secrets.FEDREG_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-3.11-${{ hashFiles('**/requirements*.txt') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-gpu.txt
      - name: Cache Hugging Face models
        uses: actions/cache@v3
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements-gpu.txt') }}
      - name: Tests
        run: pytest -m gpu

  benchmark:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-gpu-t4
    needs: cpu
    continue-on-error: true
    timeout-minutes: 60
    env:
      TRADEGOV_API_KEY: ${{ secrets.TRADEGOV_API_KEY }}
      FEDREG_API_KEY: ${{ secrets.FEDREG_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-gpu.txt
      - name: Run benchmark
        run: bash eval/collect_benchmark.sh
      - name: Upload benchmark
        uses: actions/upload-artifact@v4
        with:
          name: benchmark
          path: benchmark.md

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: cpu
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      TRADEGOV_API_KEY: ${{ secrets.TRADEGOV_API_KEY }}
      FEDREG_API_KEY: ${{ secrets.FEDREG_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Run monitor against staging
        shell: pwsh
        run: ./monitor.ps1 -Services @('https://staging/api/health','https://staging/kg/health')
