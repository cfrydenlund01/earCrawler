name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Release evidence preflight drift guard
        shell: pwsh
        run: scripts/release-evidence-preflight.ps1 -AllowEmptyDist
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build pyinstaller pip-licenses
      - name: Build wheel
        shell: pwsh
        run: scripts/build-wheel.ps1
      - name: Build hermetic wheelhouse (pinned runtime dependencies)
        shell: pwsh
        run: scripts/build-wheelhouse.ps1 -LockFile requirements-win-lock.txt
      - name: Clean-room wheel smoke
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist -Filter "*.whl" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $wheel) {
            throw "No wheel built under dist/."
          }
          scripts/package-wheel-smoke.ps1 -WheelPath $wheel.FullName
      - name: Build exe
        shell: pwsh
        run: scripts/build-exe.ps1
      - name: Make installer
        shell: pwsh
        run: scripts/make-installer.ps1
      - name: Package hermetic install artifacts
        shell: pwsh
        run: |
          $bundleRoot = Join-Path (Resolve-Path dist) "hermetic-artifacts"
          if (Test-Path $bundleRoot) {
            Remove-Item -Recurse -Force $bundleRoot
          }
          New-Item -ItemType Directory -Force -Path $bundleRoot | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $bundleRoot "scripts") | Out-Null
          Copy-Item -Path requirements-win-lock.txt -Destination (Join-Path $bundleRoot "requirements-win-lock.txt") -Force
          Copy-Item -Path scripts/install-from-wheelhouse.ps1 -Destination (Join-Path $bundleRoot "scripts/install-from-wheelhouse.ps1") -Force
          Copy-Item -Path .wheelhouse -Destination (Join-Path $bundleRoot ".wheelhouse") -Recurse -Force
          Compress-Archive -Path $bundleRoot -DestinationPath (Join-Path (Resolve-Path dist) "hermetic-artifacts.zip") -Force
      - name: Sign artifacts
        shell: pwsh
        run: scripts/sign-artifacts.ps1
      - name: Verify signatures
        shell: pwsh
        run: |
          Get-ChildItem dist -Filter *.exe | ForEach-Object { signtool verify /pa $_.FullName }
      - name: Checksums
        shell: pwsh
        run: scripts/checksums.ps1
      - name: Sign release checksums
        shell: pwsh
        run: scripts/sign-manifest.ps1 -FilePath dist/checksums.sha256
      - name: SBOM
        shell: pwsh
        run: scripts/sbom.ps1
      - name: Canonical freeze
        shell: pwsh
        run: kg/scripts/canonical-freeze.ps1
      - name: Canonical ZIP
        shell: pwsh
        run: scripts/make-canonical-zip.ps1 -Version ${{ github.ref_name }}
      - name: Manifest
        shell: pwsh
        run: scripts/make-manifest.ps1
      - name: Sign manifest
        shell: pwsh
        run: scripts/sign-manifest.ps1
      - name: Provenance attestation
        shell: pwsh
        run: scripts/provenance-attest.ps1
      - name: Record build stage evidence
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist -Filter "*.whl" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $wheel) {
            throw "No wheel built under dist/."
          }
          scripts/write-release-stage-manifest.ps1 `
            -Stage build `
            -Tag ${{ github.ref_name }} `
            -OutPath dist/promotion/build_stage_evidence.json `
            -EvidenceFiles @(
              $wheel.FullName,
              "dist/hermetic-artifacts.zip",
              "dist/checksums.sha256",
              "dist/sbom.spdx.json",
              "kg/canonical/manifest.json",
              "kg/canonical/provenance.json"
            )
      - name: Upload build stage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-build-stage
          path: |
            dist/**
            kg/canonical/**
            scripts/verify-release.ps1
            scripts/write-release-stage-manifest.ps1
          if-no-files-found: error

  validate:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download build stage artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-build-stage
          path: .
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install validation deps
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade --retries 5 -r requirements.txt
          pip install --upgrade --retries 5 -e .
      - name: Release evidence preflight drift guard
        shell: pwsh
        run: scripts/release-evidence-preflight.ps1 -AllowEmptyDist
      - name: Release security baseline (dependency audit + SAST + secret scan)
        shell: pwsh
        run: scripts/security-baseline.ps1 -Python py -RequirementsLock requirements-win-lock.txt -PipAuditIgnoreFile security/pip_audit_ignore.txt -OutputDir dist/security
      - name: Installed runtime smoke (release bundle field-install shape)
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist -Filter "*.whl" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $wheel) {
            throw "No wheel built under dist/."
          }
          scripts/installed-runtime-smoke.ps1 `
            -WheelPath $wheel.FullName `
            -UseHermeticWheelhouse `
            -HermeticBundleZipPath dist/hermetic-artifacts.zip `
            -ReleaseChecksumsPath dist/checksums.sha256 `
            -UseLiveFuseki `
            -AutoProvisionFuseki `
            -RequireFullBaseline `
            -Host 127.0.0.1 `
            -Port 9001 `
            -ReportPath dist/installed_runtime_smoke.json
      - name: Start supported API smoke service
        shell: pwsh
        run: scripts/api-start.ps1 -Host 127.0.0.1 -Port 9001
      - name: Supported API smoke parity
        shell: pwsh
        run: scripts/api-smoke.ps1 -Host 127.0.0.1 -Port 9001 -ReportPath dist/api_smoke.json
      - name: Observability API probe
        shell: pwsh
        run: scripts/health/api-probe.ps1 -Host 127.0.0.1 -Port 9001 -ReportPath dist/observability/health-api.txt -JsonReportPath dist/observability/api_probe.json
      - name: Stop supported API smoke service
        if: always()
        shell: pwsh
        run: scripts/api-stop.ps1
      - name: Optional runtime smoke (search/KG gate validation)
        shell: pwsh
        run: scripts/optional-runtime-smoke.ps1 -Host 127.0.0.1 -Port 9001 -SkipLocalAdapter -ReportPath dist/optional_runtime_smoke.json
      - name: Release integrity validation
        shell: pwsh
        run: scripts/verify-release.ps1 -RequireSignedExecutables -RequireCompleteEvidence -ApiSmokeReportPath dist/api_smoke.json -OptionalRuntimeSmokeReportPath dist/optional_runtime_smoke.json -InstalledRuntimeSmokeReportPath dist/installed_runtime_smoke.json -SecuritySummaryPath dist/security/security_scan_summary.json -ObservabilityApiProbePath dist/observability/api_probe.json -EvidenceOutPath dist/release_validation_evidence.json
      - name: Determinism check
        shell: pwsh
        run: scripts/rebuild-compare.ps1 -Version ${{ github.ref_name }}
      - name: Record validation stage evidence
        shell: pwsh
        run: |
          scripts/write-release-stage-manifest.ps1 `
            -Stage validation `
            -Tag ${{ github.ref_name }} `
            -OutPath dist/promotion/validation_stage_evidence.json `
            -EvidenceFiles @(
              "dist/promotion/build_stage_evidence.json",
              "dist/release_validation_evidence.json",
              "dist/api_smoke.json",
              "dist/optional_runtime_smoke.json",
              "dist/installed_runtime_smoke.json",
              "dist/security/security_scan_summary.json",
              "dist/observability/api_probe.json"
            )
      - name: Upload validation stage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-validation-stage
          path: |
            dist/**
            kg/canonical/**
            scripts/verify-release.ps1
            scripts/write-release-stage-manifest.ps1
          if-no-files-found: error

  promote:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download validation stage artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-validation-stage
          path: .
      - name: Update changelog
        shell: pwsh
        run: scripts/changelog-update.ps1 -NextVersion ${{ github.ref_name }}
      - name: Record promotion stage evidence
        shell: pwsh
        run: |
          scripts/write-release-stage-manifest.ps1 `
            -Stage promotion `
            -Tag ${{ github.ref_name }} `
            -OutPath dist/promotion/promotion_stage_evidence.json `
            -EvidenceFiles @(
              "dist/promotion/build_stage_evidence.json",
              "dist/promotion/validation_stage_evidence.json",
              "dist/release_validation_evidence.json",
              "dist/checksums.sha256"
            )
      - name: Upload promotion stage evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-promotion-stage
          path: dist/promotion/*.json
          if-no-files-found: error
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.whl
            dist/earctl-*-win64.exe
            dist/earcrawler-setup-*.exe
            dist/checksums.sha256
            dist/release_validation_evidence.json
            dist/api_smoke.json
            dist/optional_runtime_smoke.json
            dist/installed_runtime_smoke.json
            dist/security/*.json
            dist/observability/*.json
            dist/observability/*.txt
            dist/sbom.spdx.json
            dist/promotion/*.json
            kg/canonical/manifest.json
            kg/canonical/provenance.json
            kg/canonical/release_notes.md
            kg/canonical/checksums.sha256
            dist/*.zip
            dist/offline_bundle/**
            scripts/verify-release.ps1
          body: |
            Release evidence covers hermetic installed-runtime smoke, supported single-host API smoke parity, optional-runtime validation, CI security baseline reports, and observability API probe evidence.
            Publication is gated on signed artifacts, verified evidence, required security/observability checks, and placeholder-free distributable outputs.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

